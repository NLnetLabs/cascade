# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: 'Add a zone and manually control approval or rejection at the signing review step.'
description: ''
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/prepare-systest-env
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}

    # By default Casade policy uses the 'date-counter' serial policy which
    # makes it possible to predict the serial number it will generate.
    - name: Predict the SOA SERIAL that Cascade will generate for the signed zone
      id: expected-serial
      run: |
        EXPECTED_SERIAL=$(date +'%Y%m%d00')
        echo "serial=${EXPECTED_SERIAL}" >> "$GITHUB_OUTPUT"

    - name: Add a policy
      run: |
        POLICY_DIR=$(integration-tests/scripts/get-default-path.sh policy-dir)
        INTEGRATION_TEST_DIR="${PWD}/integration-tests/review-signed-zone"
        cp ${INTEGRATION_TEST_DIR}/policies/manual-signed-review.toml ${POLICY_DIR}/
        cascade policy reload

    - name: Make a zonefile
      run: |
        tee example.test.zone <<'EOF'
        $TTL 5 ; use a very short TTL for sped up keyset rolls
        example.test.   IN SOA ns1.example.test. mail.example.test. (
                           1          ; serial
                          60          ; refresh (60 seconds)
                          60          ; retry (60 seconds)
                        3600          ; expire (1 hour)
                           5          ; minimum (5 seconds)
                        )
        @           NS  example.test.
        @           NS  ns1.example.test.
        @           A   127.0.0.1
        ns1         A   127.0.0.1

        www         A   169.254.1.1
        mail        MX  10 example.test.
        text        TXT "Hello World!"
        EOF

    - name: Add a zone using the new policy
      run: |
        cascade zone add --policy manual-signed-review --source $PWD/example.test.zone example.test

    - name: Querying the zone at the loaded review server should succeed
      run: |
        dig @127.0.0.1 -p 4540 example.test SOA | grep -F 'status: NOERROR'

    - name: Querying the zone at the signed review server should succeed
      run: |
        dig @127.0.0.1 -p 4541 example.test SOA | grep -F 'status: NOERROR'

    - name: Querying the zone at the publication server should fail
      run: |
        dig @127.0.0.1 -p 4542 example.test SOA | grep -F 'status: NXDOMAIN'

    - name: Reject the zone
      env:
        EXPECTED_SERIAL: ${{ steps.expected-serial.outputs.serial }}
      run: |
        cascade zone reject --signed example.test ${EXPECTED_SERIAL}

    - name: Allow time for re-sign to begin
      run: |
        sleep 5s

    - name: Querying the zone at the loaded review server should fail
      run: |
        dig @127.0.0.1 -p 4540 example.test SOA | grep -F 'status: NXDOMAIN'

    - name: Reload the zone
      run: |
        cascade zone reload example.test

    - name: Querying the zone at the loaded review server should succeed
      run: |
        dig @127.0.0.1 -p 4540 example.test SOA | grep -F 'status: NOERROR'

    - name: Querying the zone at the signed review server should succeed
      run: |
        dig @127.0.0.1 -p 4541 example.test SOA | grep -F 'status: NOERROR'

    - name: Querying the zone at the publication server should fail
      run: |
        dig @127.0.0.1 -p 4542 example.test SOA | grep -F 'status: NXDOMAIN'

    - name: Approve the zone
      env:
        EXPECTED_SERIAL: ${{ steps.expected-serial.outputs.serial }}
      run: |
        cascade zone approve --signed example.test ${EXPECTED_SERIAL}
        
    - name: Querying the zone at the publication server should succeed
      run: |
        dig @127.0.0.1 -p 4542 example.test SOA | grep -F 'status: NOERROR'

    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
