# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: 'Using TSIG with downstream nameservers'
description: 'Using TSIG with downstream namservers'
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
  send-notify-to:
    description: The IP address, port and name of the TSIG key to use when sending NOTIFY messages to downstream nameservers.
    required: false
    default: ''
    type: string
  accept-xfr-from:
    description: The IP address, port and name of the TSIG key to permit when replying to SOA and XFR requests from downstream nameservers.
    required: false
    default: ''
    type: string
  downstream-expects-tsig:
    description: Whether or not the downstream secondary NSD should expect the NOTIFY from Cascade to use TSIG.
    required: true
    type: number
  downstream-uses-tsig:
    description: Whether or not the downstream secondary NSD should use TSIG with XFR to Cascade.
    required: true
    type: number
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/prepare-systest-env
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}

    - name: Determine the downstream secondary zone config to use
      id: set-zone-name
      run: |
        if [[ ${{ inputs.downstream-expects-tsig }} -eq 0 && ${{ inputs.downstream-uses-tsig }} -eq 0 ]]; then
          ZONE_NAME="example.test."
        elif [[ ${{ inputs.downstream-expects-tsig }} -eq 0 && ${{ inputs.downstream-uses-tsig }} -eq 1 ]]; then
          ZONE_NAME="xfr-tsig.test."
        elif [[ ${{ inputs.downstream-expects-tsig }} -eq 1 && ${{ inputs.downstream-uses-tsig }} -eq 0 ]]; then
          ZONE_NAME="notify-tsig.test."
        else
          ZONE_NAME="notify-and-xfr-tsig.test."
        fi
        echo "ZONE_NAME=${ZONE_NAME}" >> "$GITHUB_OUTPUT"

    - name: Determine if we expect this test to succeed or fail
      id: set-expected-outcome
      run: |
        if [[ "${{ inputs.send-notify-to }}" != *"^"* && ${{ inputs.downstream-expects-tsig }} -eq 0 ]]; then
          SUCCESS=1
        elif [[ "${{ inputs.send-notify-to }}" != *"^"* && ${{ inputs.downstream-expects-tsig }} -eq 1 ]]; then
          SUCCESS=0
        elif [[ "${{ inputs.send-notify-to }}" == *"^"* && ${{ inputs.downstream-expects-tsig }} -eq 0 ]]; then
          SUCCESS=0
        else
          SUCCESS=1
        fi
        echo "SUCCESS=${SUCCESS}" >> "$GITHUB_OUTPUT"

    - name: Make a zonefile to load zone ${{ steps.set-zone-name.outputs.ZONE_NAME }}
      run: |
        cat >test.zone <<'EOF'
        $TTL 5 ; use a very short TTL for sped up keyset rolls
        ${{ steps.set-zone-name.outputs.ZONE_NAME }}   IN SOA ns1.${{ steps.set-zone-name.outputs.ZONE_NAME }} mail.${{ steps.set-zone-name.outputs.ZONE_NAME }} (
                           1          ; serial
                          60          ; refresh (60 seconds)
                          60          ; retry (60 seconds)
                        3600          ; expire (1 hour)
                           5          ; minimum (5 seconds)
                        )
        @           NS  ${{ steps.set-zone-name.outputs.ZONE_NAME }}
        @           NS  ns1.${{ steps.set-zone-name.outputs.ZONE_NAME }}
        @           A   127.0.0.1
        ns1         A   127.0.0.1

        www         A   169.254.1.1
        mail        MX  10 ${{ steps.set-zone-name.outputs.ZONE_NAME }}
        text        TXT "Hello World!"
        EOF

    - name: Add a custom policy
      run: |
        POLICY_DIR=$(integration-tests/scripts/get-default-path.sh policy-dir)
        cascade template policy | grep -Ev '(send-notify-to|accept-xfr-from)' > "${POLICY_DIR}/restricted.toml"
        if [ "${{ inputs.accept-xfr-from }}" != "" ]; then
          echo 'accept-xfr-from = ["${{ inputs.accept-xfr-from }}"]' >> "${POLICY_DIR}/restricted.toml"
        fi
        if [ "${{ inputs.send-notify-to }}" != "" ]; then
          echo 'send-notify-to = ["${{ inputs.send-notify-to }}"]' >> "${POLICY_DIR}/restricted.toml"
        fi
        if [[ "${{ inputs.accept-xfr-from}}" == *"^tsig-key"* || "${{ inputs.send-notify-to }}" == *"^tsig-key"* ]]; then
          cascade tsig add tsig-key hmac-sha256 "COzoVsYQmXeXiyq1Quhp0bbVnMyxjPxsaGSoIWR98i0="
        fi
        cascade policy reload

    - name: Add zone ${{ steps.set-zone-name.outputs.ZONE_NAME }} using the custom policy
      run: |
        cascade zone add --policy restricted --source $PWD/test.zone ${{ steps.set-zone-name.outputs.ZONE_NAME }}

    - name: Wait for zone ${{ steps.set-zone-name.outputs.ZONE_NAME }} to be signed and published
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone status ${{ steps.set-zone-name.outputs.ZONE_NAME }}| grep -q "Published zone available"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status ${{ steps.set-zone-name.outputs.ZONE_NAME }}
            echo "timeout: zone status did not report published zone available" >&2
            exit 1
          fi
          sleep 1
        done

    - name: Verify that the ${{ steps.set-zone-name.outputs.ZONE_NAME }} zone is being served
      run: |
        dig @127.0.0.1 -p 4542 ${{ steps.set-zone-name.outputs.ZONE_NAME }} SOA &> soa-query.log

    - name: Tell NSD that zone ${{ steps.set-zone-name.outputs.ZONE_NAME }} is now available
      # Only necessary if NOTIFY is not setup for cascade
      if: ${{ inputs.send-notify-to == '' }}
      run: |
        ./integration-tests/scripts/manage-test-environment.sh control nsd-secondary transfer ${{ steps.set-zone-name.outputs.ZONE_NAME }}

    - name: The ${{ steps.set-zone-name.outputs.ZONE_NAME }} zone should now be available via the secondary
      if: ${{ steps.set-expected-outcome.output.SUCCESS }}
      run: |
        dig @127.0.0.1 -p 1054 text.${{ steps.set-zone-name.outputs.ZONE_NAME }} TXT | grep 'Hello World'

    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
