# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: 'Tests loading of all supported RR types.'
description: 'Tests loading of all supported RR types.'
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}

    - name: Load a zone containing all supported RR types
      run: |
        INTEGRATION_TEST_DIR="${PWD}/integration-tests/all-rr-types"
        cascade zone add --source "${INTEGRATION_TEST_DIR}/all.rr.org" --policy default all.rr.org

    - name: Check zone status
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone status all.rr.org | grep -q "Published zone available"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status all.rr.org
            echo "::error:: timeout: zone status did not report published zone available"
            exit 1
          fi
          sleep 1
        done

    - name: Kill Cascade so that coverage metrics, if enabled, get written out.
      run: pkill cascaded

    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
