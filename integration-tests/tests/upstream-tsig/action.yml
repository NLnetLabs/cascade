# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: 'Use TSIG with an upstream nameserver.'
description: 'Use TSIG with an upstream nameserver.'
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/prepare-systest-env
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}

    - name: Add zone without the required TSIG key.
      run: |
        cascade zone add --policy default --source 127.0.0.1:1055 example-tsig.test

    - name: Check zone status
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone status example-tsig.test | grep -q "Published zone available"; do
          if (($(date +%s) > (start + timeout))); then
            exit 0
          fi
          sleep 1
        done
        echo "::error:: zone status unexpectedly reports TSIG required zone was retrieved and published without using the TSIG key"
        exit 1

    - name: Remove and re-add the zone with the required TSIG key.
      run: |
        cascade zone remove example-tsig.test
        cascade tsig add tsig-key hmac-sha256 "COzoVsYQmXeXiyq1Quhp0bbVnMyxjPxsaGSoIWR98i0="
        cascade zone add --policy default --source 127.0.0.1:1055^tsig-key example-tsig.test

    - name: Check zone status
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone status example-tsig.test | grep -q "Published zone available"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example-tsig.test
            echo "::error:: timeout: zone status did not report published zone available"
            exit 1
          fi
          sleep 1
        done

    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
