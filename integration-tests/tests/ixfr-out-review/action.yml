# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: 'Serve manual zone modifications via IXFR for review.'
description: 'Serve a zone via IXFR to the NSD secondary.'
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}
        fake-time: 1600000000

    - name: Determine expected published serial number
      id: set-vars
      run: |
        EXPECTED_SERIAL="$(date +'%Y%m%d00')"
        echo "EXPECTED_SERIAL=${EXPECTED_SERIAL}" >>"$GITHUB_OUTPUT"

    - name: Make a zone based on RFC 1995 section 7
      run: |
        cat >"example.test.zone" <<EOF
        example.test.       IN SOA NS.example.test. mail.example.test. (
                                1 60 60 3600 5)
                            IN NS  NS.example.test.
        NS.example.test.    IN A   133.69.136.1
        NEZU.example.test.  IN A   133.69.136.5
        EOF

    - name: Add the zone
      run: |
        TEST_DIR="${PWD}/integration-tests/ixfr-out"
        KEY_NAME="Kexample.test.+015+00580.key"
        KEY_FILE="${TEST_DIR}/keys/${KEY_NAME}"
        # Use a pre-created key so that generated signatures can be matched
        # against reference output.
        cascade zone add --policy default --source "example.test.zone" --import-csk-file "${KEY_FILE}" example.test

    - name: Check zone status
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone status example.test | grep -q "Published zone available"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            echo "timeout: zone status did not report published zone available" >&2
            exit 1
          fi
          sleep 1
        done

    - name: Expect serial 1 of the zone at the loaded review server
      run: |
        timeout=3 # seconds
        start=$(date +%s)
        until dig +short @127.0.0.1 -p 4540 example.test SOA | grep -qi "ns.example.test. mail.example.test. 1 60 60 3600 5"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            dig +short @127.0.0.1 -p 4540 example.test SOA
            echo "::error:: timeout: loaded review server is not serving serial 1 of the zone"
            exit 1
          fi
          sleep 1
        done

    - name: Expect serial 1 of the zone at the signed review server
      env:
        EXPECTED_SERIAL: ${{ steps.set-vars.outputs.EXPECTED_SERIAL }}
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until dig +short @127.0.0.1 -p 4541 example.test SOA | grep -qi "ns.example.test. mail.example.test. ${EXPECTED_SERIAL} 60 60 3600 5"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            dig +short @127.0.0.1 -p 4541 example.test SOA
            echo "::error:: timeout: signed review server is not serving serial 1 of the zone"
            exit 1
          fi
          sleep 1
        done

    - name: Edit and reload serial 2 of the zone
      run: |
        cat >"example.test.zone" <<EOF
        example.test.          IN SOA ns.example.test. mail.example.test. (
                                   2 60 60 3600 5)
                               IN NS  NS.example.test.
        NS.example.test.       IN A   133.69.136.1
        JAIN-BB.example.test.  IN A   133.69.136.4
                               IN A   192.41.197.2
        EOF
        cascade zone reload example.test

    - name: Expect serial 2 of the zone at the loaded review server
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until dig +short @127.0.0.1 -p 4540 example.test SOA | grep -qi "ns.example.test. mail.example.test. 2 60 60 3600 5"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            dig +short @127.0.0.1 -p 4540 example.test SOA
            echo "::error:: timeout: loaded review server is not serving serial 2 of the zone"
            exit 1
          fi
          sleep 1
        done

    - name: Expect serial 2 of the zone at the signed review server
      env:
        EXPECTED_SERIAL: ${{ steps.set-vars.outputs.EXPECTED_SERIAL }}
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        let EXPECTED_SERIAL=$(( EXPECTED_SERIAL + 1 ))
        until dig +short @127.0.0.1 -p 4541 example.test SOA | grep -qi "ns.example.test. mail.example.test. ${EXPECTED_SERIAL} 60 60 3600 5"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            dig +short @127.0.0.1 -p 4541 example.test SOA
            echo "::error:: timeout: signed review server is not serving serial 2 of the zone"
            exit 1
          fi
          sleep 1
        done

    - name: Edit and reload serial 3 of the zone
      run: |
        cat >"example.test.zone" <<EOF
        example.test.          IN SOA ns.example.test. mail.example.test. (
                                   3 60 60 3600 5)
                               IN NS  NS.example.test.
        NS.example.test.       IN A   133.69.136.1
        JAIN-BB.example.test.  IN A   133.69.136.3
                               IN A   192.41.197.2
        EOF
        cascade zone reload example.test

    - name: Expect serial 3 of the zone at the loaded review server
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until dig +short @127.0.0.1 -p 4540 example.test SOA | grep -qi "ns.example.test. mail.example.test. 3 60 60 3600 5"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            dig +short @127.0.0.1 -p 4540 example.test SOA
            echo "::error:: timeout: loaded review server is not serving serial 3 of the zone"
            exit 1
          fi
          sleep 1
        done

    - name: Expect serial 3 of the zone at the signed review server
      env:
        EXPECTED_SERIAL: ${{ steps.set-vars.outputs.EXPECTED_SERIAL }}
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        let EXPECTED_SERIAL=$(( EXPECTED_SERIAL + 2 ))
        until dig +short @127.0.0.1 -p 4541 example.test SOA | grep -qi "ns.example.test. mail.example.test. ${EXPECTED_SERIAL} 60 60 3600 5"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            dig +short @127.0.0.1 -p 4541 example.test SOA
            echo "::error:: timeout: signed review server is not serving serial 3 of the zone"
            exit 1
          fi
          sleep 1
        done

    - name: Verify IXFR of serial 1..=3 at the loaded review server
      run: |
        dig +onesoa +noall +answer @127.0.0.1 -p 4540 example.test -t IXFR=1 &> loaded-review-ixfr-1-3.log
        TEST_DIR="${PWD}/integration-tests/ixfr-out-review"
        LC_COLLATE=C sort "${TEST_DIR}/reference-output/loaded-review.ixfr-1-3" | egrep -v '^;|^$' > reference.output.sorted
        LC_COLLATE=C sort loaded-review-ixfr-1-3.log > output.sorted
        diff -u -w output.sorted reference.output.sorted

    - name: Verify IXFR of serial 2..=3 at the loaded review server
      run: |
        dig +onesoa +noall +answer @127.0.0.1 -p 4540 example.test -t IXFR=2 &> loaded-review-ixfr-2-3.log
        TEST_DIR="${PWD}/integration-tests/ixfr-out-review"
        LC_COLLATE=C sort "${TEST_DIR}/reference-output/loaded-review.ixfr-2-3" | egrep -v '^;|^$' > reference.output.sorted
        LC_COLLATE=C sort loaded-review-ixfr-2-3.log > output.sorted
        diff -u -w output.sorted reference.output.sorted

    - name: Verify IXFR of serial 3..=3 at the loaded review server
      run: |
        dig +onesoa +noall +answer @127.0.0.1 -p 4540 example.test -t IXFR=3 &> loaded-review-ixfr-3-3.log
        TEST_DIR="${PWD}/integration-tests/ixfr-out-review"
        LC_COLLATE=C sort "${TEST_DIR}/reference-output/loaded-review.ixfr-3-3" | egrep -v '^;|^$' > reference.output.sorted
        LC_COLLATE=C sort loaded-review-ixfr-3-3.log > output.sorted
        diff -u -w output.sorted reference.output.sorted

    - name: Verify IXFR of serial 1..=3 at the signed review server
      env:
        EXPECTED_SERIAL: ${{ steps.set-vars.outputs.EXPECTED_SERIAL }}
      run: |
        dig +onesoa +noall +answer @127.0.0.1 -p 4541 example.test -t IXFR=${EXPECTED_SERIAL} &> signed-review-ixfr-1-3.log
        TEST_DIR="${PWD}/integration-tests/ixfr-out-review"
        LC_COLLATE=C sort "${TEST_DIR}/reference-output/signed-review.ixfr-1-3" | egrep -v '^;|^$' > reference.output.sorted
        LC_COLLATE=C sort signed-review-ixfr-1-3.log > output.sorted
        diff -u -w output.sorted reference.output.sorted

    - name: Verify IXFR of serial 2..=3 at the signed review server
      env:
        EXPECTED_SERIAL: ${{ steps.set-vars.outputs.EXPECTED_SERIAL }}
      run: |
        dig +onesoa +noall +answer @127.0.0.1 -p 4541 example.test -t IXFR=$(( EXPECTED_SERIAL + 1 )) &> signed-review-ixfr-2-3.log
        TEST_DIR="${PWD}/integration-tests/ixfr-out-review"
        LC_COLLATE=C sort "${TEST_DIR}/reference-output/signed-review.ixfr-2-3" | egrep -v '^;|^$' > reference.output.sorted
        LC_COLLATE=C sort signed-review-ixfr-2-3.log > output.sorted
        diff -u -w output.sorted reference.output.sorted

    - name: Verify IXFR of serial 3..=3 at the signed review server
      env:
        EXPECTED_SERIAL: ${{ steps.set-vars.outputs.EXPECTED_SERIAL }}
      run: |
        dig +onesoa +noall +answer @127.0.0.1 -p 4541 example.test -t IXFR=$(( EXPECTED_SERIAL + 2 )) &> signed-review-ixfr-3-3.log
        TEST_DIR="${PWD}/integration-tests/ixfr-out-review"
        LC_COLLATE=C sort "${TEST_DIR}/reference-output/signed-review.ixfr-3-3" | egrep -v '^;|^$' > reference.output.sorted
        LC_COLLATE=C sort signed-review-ixfr-3-3.log > output.sorted
        diff -u -w output.sorted reference.output.sorted

    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
