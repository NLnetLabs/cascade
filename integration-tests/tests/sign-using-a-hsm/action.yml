# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: ''
description: ''
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/prepare-systest-env
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}

    - name: Start Cascade-HSM-Bridge
      run: |
        INTEGRATION_TEST_DIR="${PWD}/integration-tests/sign-using-a-hsm"

        # Tell the OpenSC project PKCS11-Spy module to passthrough to the
        # SoftHSMv2 PKCS#11 module.
        export PKCS11SPY="/lib/x86_64-linux-gnu/softhsm/libsofthsm2.so"
        export PKCS11SPY_OUTPUT="${PWD}/pkcs11-spy.log"

        # Start Cascade-HSM-Bridge with our configuration file that directs it
        # to load the PKCS11-Spy PKCS#11 module which in turn will load and
        # passthrough to the NitroKey NetHSM PKCS#11 module.
        cascade-hsm-bridge --config "${INTEGRATION_TEST_DIR}/cascade-hsm-bridge.toml"

    - name: Configure Cascade to use SoftHSM
      run: |
        cascade hsm add --insecure --username Cascade --password 1234 cascade-hsm-bridge 127.0.0.1

    - name: Add a policy that uses the HSM
      run: |
        POLICY_DIR=$(integration-tests/scripts/get-default-path.sh policy-dir)
        cascade template policy > "${POLICY_DIR}/with-hsm.toml"
        sed -i -e 's/^#hsm-server-id.\+/hsm-server-id = "cascade-hsm-bridge"/' "${POLICY_DIR}/with-hsm.toml"
        cascade policy reload

    - name: Add a zone served by the NSD primary
      run: |
        cascade zone add --policy with-hsm --source 127.0.0.1:1055 example.test

    - name: Query zone
      run: |
        dig @127.0.0.1 -p 4542 example.test AXFR >dig-axfr.log
        grep -q SOA dig-axfr.log

    - name: Query the detailed key output of Cascade for KMIP IDs
      run: |
        cascade zone status --detailed example.test | grep -Fq 'kmip://'

    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
